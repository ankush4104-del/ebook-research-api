openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: research
    description: Research operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /research:
    post:
      operationId: research
      tags: [research]
      summary: Research a topic for book creation
      description: Performs web and academic research on a topic, returning structured data optimized for book generation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchRequest"
      responses:
        "200":
          description: Research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /outline:
    post:
      operationId: outline
      tags: [research]
      summary: Generate a research-based nonfiction book outline
      description: Uses Tavily web research to produce a complete book outline including a recommended title, subtitle options, chapter-by-chapter plan with objectives and key topics, word count estimates, and recommended resources. Returns planning data only — does not generate content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutlineRequest"
      responses:
        "200":
          description: Outline results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /citations:
    post:
      operationId: citations
      tags: [research]
      summary: Generate formatted academic citations for a topic
      description: Searches Crossref for real academic papers on a topic and returns structured reference objects, each with full metadata and a correctly formatted citation in the requested style (APA, MLA, Chicago, or Harvard).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitationsRequest"
      responses:
        "200":
          description: Structured references formatted in the requested citation style
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitationsResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /book-market-research:
    post:
      operationId: bookMarketResearch
      tags: [research]
      summary: Analyze a book topic's market viability
      description: Uses web research to assess market demand, competition, audience size, and positioning opportunities for a proposed book topic.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookMarketResearchRequest"
      responses:
        "200":
          description: Book market analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookMarketResearchResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /kdp-research:
    post:
      operationId: kdpResearch
      tags: [research]
      summary: Research KDP publishing metadata
      description: Searches Amazon/Kindle market data to return KDP keywords, BISAC categories, competitive titles, pricing suggestions, and description hooks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KdpResearchRequest"
      responses:
        "200":
          description: KDP research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdpResearchResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /kdp-keywords:
    post:
      operationId: kdpKeywords
      tags: [research]
      summary: Research Amazon KDP keyword opportunities for a book topic
      description: Uses web research to surface primary, long-tail, buyer-intent, and category keywords for KDP discoverability, along with subtitle suggestions, recommended categories, and positioning guidance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KdpKeywordsRequest"
      responses:
        "200":
          description: KDP keyword research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdpKeywordsResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chapter-research:
    post:
      operationId: chapterResearch
      tags: [research]
      summary: Deep research and planning data for a specific book chapter
      description: Uses Tavily web research and Crossref academic search to return structured planning data for a single chapter — including learning objectives, key concepts, statistics, case studies, expert insights, common mistakes, action steps, frameworks, and academic references. Returns research data only; does not generate content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterResearchRequest"
      responses:
        "200":
          description: Chapter research and planning data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterResearchResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    BookType:
      type: string
      enum: [ebook, nonfiction, training_manual]
    ResearchRequest:
      type: object
      properties:
        topic:
          type: string
        book_type:
          $ref: "#/components/schemas/BookType"
        target_audience:
          type: string
      required:
        - topic
        - book_type
        - target_audience
    Statistic:
      type: object
      properties:
        fact:
          type: string
        source:
          type: string
      required:
        - fact
        - source
    CaseStudy:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
      required:
        - title
        - summary
    Source:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
      required:
        - title
        - url
    AcademicReference:
      type: object
      properties:
        title:
          type: string
        authors:
          type: string
        doi:
          type: string
      required:
        - title
        - authors
        - doi
    ResearchResult:
      type: object
      properties:
        topic:
          type: string
        summary:
          type: string
        key_concepts:
          type: array
          items:
            type: string
        chapter_ideas:
          type: array
          items:
            type: string
        industry_trends:
          type: array
          items:
            type: string
        statistics:
          type: array
          items:
            $ref: "#/components/schemas/Statistic"
        case_studies:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudy"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        academic_references:
          type: array
          items:
            $ref: "#/components/schemas/AcademicReference"
      required:
        - topic
        - summary
        - key_concepts
        - chapter_ideas
        - industry_trends
        - statistics
        - case_studies
        - sources
        - academic_references
    OutlineRequest:
      type: object
      properties:
        topic:
          type: string
          description: The book topic
        book_type:
          type: string
          enum: [ebook, nonfiction, training_manual]
          description: The type of book to outline
        target_audience:
          type: string
          description: The intended reader audience
        length:
          type: string
          enum: ["5000-10000", "10000-20000", "20000-50000", "50000-75000", "75000+"]
          description: Target word count range for the book
      required:
        - topic
        - book_type
        - target_audience
        - length
    OutlineChapter:
      type: object
      properties:
        chapter_number:
          type: integer
          description: Chapter sequence number (1-indexed)
        chapter_title:
          type: string
          description: Title of the chapter
        objective:
          type: string
          description: Single learning objective for this chapter
        key_topics:
          type: array
          items:
            type: string
          description: Key subtopics and concepts covered in this chapter
        estimated_words:
          type: integer
          description: Estimated word count for this chapter
      required:
        - chapter_number
        - chapter_title
        - objective
        - key_topics
        - estimated_words
    OutlineResult:
      type: object
      properties:
        topic:
          type: string
        recommended_title:
          type: string
          description: Single best-fit title for the book based on research
        subtitle_options:
          type: array
          items:
            type: string
          description: Multiple subtitle candidates embedding key phrases
        recommended_structure:
          type: string
          description: Narrative description of the book's overall structure
        reader_transformation:
          type: string
          description: Before/after statement describing the reader's transformation
        book_promise:
          type: string
          description: One compelling sentence describing the core value the reader gets
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/OutlineChapter"
        total_estimated_words:
          type: integer
          description: Sum of all chapter word estimates
        recommended_resources:
          type: array
          items:
            type: string
          description: Books, tools, and resources the author should reference when writing
      required:
        - topic
        - recommended_title
        - subtitle_options
        - recommended_structure
        - reader_transformation
        - book_promise
        - chapters
        - total_estimated_words
        - recommended_resources
    CitationsRequest:
      type: object
      properties:
        topic:
          type: string
          description: The topic to find citations for
        style:
          type: string
          enum: [APA, MLA, Chicago, Harvard]
          description: Citation style to apply to all returned references
      required:
        - topic
        - style
    CitationReference:
      type: object
      properties:
        title:
          type: string
          description: Title of the work
        authors:
          type: string
          description: Formatted author string (style-appropriate)
        year:
          type: string
          description: Publication year or "n.d." if unknown
        doi:
          type: string
          description: DOI of the work (without https://doi.org/ prefix)
        citation:
          type: string
          description: Fully formatted citation in the requested style
      required:
        - title
        - authors
        - year
        - doi
        - citation
    CitationsResult:
      type: object
      properties:
        topic:
          type: string
          description: The topic that was searched
        style:
          type: string
          enum: [APA, MLA, Chicago, Harvard]
          description: The citation style applied
        references:
          type: array
          items:
            $ref: "#/components/schemas/CitationReference"
          description: Structured references with formatted citations
      required:
        - topic
        - style
        - references
    KdpResearchRequest:
      type: object
      properties:
        topic:
          type: string
        book_type:
          $ref: "#/components/schemas/BookType"
        target_audience:
          type: string
      required:
        - topic
        - book_type
        - target_audience
    BisacCategory:
      type: object
      properties:
        name:
          type: string
        bisac_code:
          type: string
      required:
        - name
        - bisac_code
    CompetitiveTitle:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        url:
          type: string
        price_range:
          type: string
      required:
        - title
        - author
        - url
        - price_range
    KdpPricingSuggestion:
      type: object
      properties:
        ebook_price:
          type: string
        print_price:
          type: string
        rationale:
          type: string
      required:
        - ebook_price
        - print_price
        - rationale
    KdpResearchResult:
      type: object
      properties:
        topic:
          type: string
        keywords:
          type: array
          items:
            type: string
          description: Up to 7 KDP keywords
        categories:
          type: array
          items:
            $ref: "#/components/schemas/BisacCategory"
        competitive_titles:
          type: array
          items:
            $ref: "#/components/schemas/CompetitiveTitle"
        market_insights:
          type: array
          items:
            type: string
        pricing_suggestion:
          $ref: "#/components/schemas/KdpPricingSuggestion"
        description_hooks:
          type: array
          items:
            type: string
        title_keywords:
          type: array
          items:
            type: string
      required:
        - topic
        - keywords
        - categories
        - competitive_titles
        - market_insights
        - pricing_suggestion
        - description_hooks
        - title_keywords
    BookMarketResearchRequest:
      type: object
      properties:
        topic:
          type: string
          description: The proposed book topic to analyze
      required:
        - topic
    BookMarketResearchResult:
      type: object
      properties:
        market_demand:
          type: string
          description: Assessment of reader demand and market size for this topic
        competition_level:
          type: string
          description: Assessment of how many competing books already exist
        target_audiences:
          type: array
          items:
            type: string
          description: Specific reader segments who would buy this book
        popular_subtopics:
          type: array
          items:
            type: string
          description: Subtopics frequently covered in existing books on this topic
        content_gaps:
          type: array
          items:
            type: string
          description: Underserved angles or missing content in the existing market
        positioning_recommendations:
          type: array
          items:
            type: string
          description: Strategic recommendations for how to position the book
        keyword_opportunities:
          type: array
          items:
            type: string
          description: Keyword and topic phrases discovered during research with high search relevance
        monetization_potential:
          type: string
          description: Assessment of revenue potential and willingness to pay for a book on this topic
        recommended_positioning:
          type: string
          description: Single strategic positioning statement for the book
        recommended_angles:
          type: array
          items:
            type: string
          description: Differentiated angles or framings that could make the book stand out
      required:
        - market_demand
        - competition_level
        - target_audiences
        - popular_subtopics
        - content_gaps
        - positioning_recommendations
        - keyword_opportunities
        - monetization_potential
        - recommended_positioning
        - recommended_angles
    KdpKeywordsRequest:
      type: object
      properties:
        topic:
          type: string
          description: The proposed book topic to research KDP keywords for
      required:
        - topic
    KdpKeywordsResult:
      type: object
      properties:
        topic:
          type: string
        primary_keywords:
          type: array
          items:
            type: string
          description: Short 1-3 word keywords a reader types directly into Amazon search
        long_tail_keywords:
          type: array
          items:
            type: string
          description: 4-8 word phrases targeting specific reader intent with lower competition
        buyer_intent_keywords:
          type: array
          items:
            type: string
          description: Phrases used by readers actively looking to buy or enrol in learning
        category_keywords:
          type: array
          items:
            type: string
          description: Broader topic terms that help KDP match the book to category browse pages
        subtitle_suggestions:
          type: array
          items:
            type: string
          description: Subtitle options embedding high-value keywords naturally
        recommended_categories:
          type: array
          items:
            type: string
          description: Amazon KDP browse categories best suited for this book
        target_audiences:
          type: array
          items:
            type: string
          description: Reader segments most likely to search for and buy this book
        keyword_difficulty:
          type: string
          description: Assessment of how competitive the primary keywords are on KDP
        discoverability_score:
          type: string
          description: Overall assessment of how discoverable a book on this topic would be
        positioning_suggestions:
          type: array
          items:
            type: string
          description: KDP-specific tips for title, subtitle, category, and backend keyword optimisation
      required:
        - topic
        - primary_keywords
        - long_tail_keywords
        - buyer_intent_keywords
        - category_keywords
        - subtitle_suggestions
        - recommended_categories
        - target_audiences
        - keyword_difficulty
        - discoverability_score
        - positioning_suggestions
    ChapterResearchRequest:
      type: object
      properties:
        topic:
          type: string
          description: The overall book topic
        chapter_title:
          type: string
          description: The title of the specific chapter to research
        target_audience:
          type: string
          description: The intended reader audience
      required:
        - topic
        - chapter_title
        - target_audience
    ChapterStatistic:
      type: object
      properties:
        fact:
          type: string
          description: A specific data point or statistic
        source:
          type: string
          description: The domain or publication this statistic came from
      required:
        - fact
        - source
    ChapterCaseStudy:
      type: object
      properties:
        title:
          type: string
          description: Case study or example title
        summary:
          type: string
          description: 2-3 sentence description of the case study
      required:
        - title
        - summary
    ChapterResearchResult:
      type: object
      properties:
        chapter_title:
          type: string
        summary:
          type: string
          description: 2-3 sentence overview of what this chapter covers
        learning_objectives:
          type: array
          items:
            type: string
          description: Specific, measurable things the reader will be able to do after reading
        key_concepts:
          type: array
          items:
            type: string
          description: Core terms and ideas the chapter must define and explain
        important_subtopics:
          type: array
          items:
            type: string
          description: Sub-areas and supporting topics the chapter should address
        industry_trends:
          type: array
          items:
            type: string
          description: Current trends from research relevant to this chapter
        statistics:
          type: array
          items:
            $ref: "#/components/schemas/ChapterStatistic"
          description: Data points and statistics to cite in this chapter
        case_studies:
          type: array
          items:
            $ref: "#/components/schemas/ChapterCaseStudy"
          description: Real-world examples and case studies to reference
        expert_insights:
          type: array
          items:
            type: string
          description: Notable quotes or expert perspectives on the chapter topic
        common_mistakes:
          type: array
          items:
            type: string
          description: Frequent errors and pitfalls practitioners make with this topic
        action_steps:
          type: array
          items:
            type: string
          description: Practical steps the reader can take immediately after reading
        recommended_examples:
          type: array
          items:
            type: string
          description: Specific examples the author should include in this chapter
        recommended_frameworks:
          type: array
          items:
            type: string
          description: Named frameworks, models, or methodologies to reference
        academic_references:
          type: array
          items:
            type: string
          description: APA-formatted academic citations from Crossref
        sources:
          type: array
          items:
            type: string
          description: Source URLs from web research
      required:
        - chapter_title
        - summary
        - learning_objectives
        - key_concepts
        - important_subtopics
        - industry_trends
        - statistics
        - case_studies
        - expert_insights
        - common_mistakes
        - action_steps
        - recommended_examples
        - recommended_frameworks
        - academic_references
        - sources
